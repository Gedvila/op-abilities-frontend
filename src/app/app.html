<main style="padding: 20px; font-family: sans-serif;">
  <h1>Tipos de Dano</h1>

  <ul>
    @for (damageKind of damageList; track damageKind.id) {
      <li style="margin-bottom: 10px;">
        <strong>{{ damageKind.name }}</strong>: {{ damageKind.description }}
      </li>
    } @empty {
      <li>A carregar dados do servidor... Ou nenhum tipo de dano encontrado.</li>
    }
  </ul>
</main>
