<header class="navbar">
  <div class="navbar-inner">
    <span class="navbar-brand" (click)="goHome()">
      OP Abilities
    </span>

    <nav class="navbar-tabs" role="tablist">
      @for (tab of tabs; track tab.id) {
        <button
          class="tab-btn"
          role="tab"
          [class.active]="activeTab() === tab.id"
          [attr.aria-selected]="activeTab() === tab.id"
          (click)="setTab(tab.id)"
        >
          <span class="tab-label">{{ tab.label }}</span>
        </button>
      }
    </nav>
  </div>
</header>

@if (activeTab() === null) {
  <section class="home-hero">
    <div class="home-content">
      <h1 class="home-title">OP Abilities</h1>
      <div class="home-cards">
        @for (tab of tabs; track tab.id) {
          <button class="home-card" (click)="setTab(tab.id)">
            <span class="home-card-label">{{ tab.label }}</span>
          </button>
        }
      </div>
    </div>
  </section>
}

<main class="page-content" role="tabpanel">
  @if (activeTab() === 'elementos') {
    <app-elementos/>
  } @if (activeTab() === 'poderes-paranormais') {
  <app-poderes-paranormais/>
} @if (activeTab() === 'poderes-classe') {
  <app-poderes-classe/>
} @if (activeTab() === 'itens') {
  <app-itens/>
}
</main>
